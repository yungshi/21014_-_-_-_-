    </div>

    <script>
        // 랜드마크 데이터 및 실측 기반 위치 보정
        const LANDMARKS = [
            { id: 'airport', name: "제주공항", x: -120, z: -280, color: "#10b981", rock: "현무암", layer: "용담층", desc: "출발 기점." },
            { id: 'kwanumsa', name: "관음사", x: -30, z: -170, color: "#f87171", rock: "현무암", layer: "백록담층", desc: "해발 약 600m. 공항 기점 13km/4h 타겟." },
            { id: 'peak', name: "한라산", x: 0, z: 0, color: "#ffffff", rock: "조면암", layer: "백록담층", desc: "해발 1,947m. 공항 기점 23km/9h 타겟." },
            { id: 'seongpanak', name: "성판악", x: 170, z: 130, color: "#60a5fa", rock: "현무암", layer: "성판악층", desc: "공항 기점 22km/6h 타겟." },
            { id: 'darangsi', name: "다랑쉬오름", x: 420, z: -70, color: "#a855f7", rock: "분석구", layer: "구좌층", desc: "공항 기점 37km/10h 타겟." },
            { id: 'sanbang', name: "산방산", x: -430, z: 290, color: "#ec4899", rock: "조면암", layer: "산방산층", desc: "공항 기점 38km/10h 타겟." },
            { id: 'sungsan', name: "성산일출봉", x: 490, z: 50, color: "#fbbf24", rock: "응회암", layer: "성산층", desc: "공항 기점 44km/12h 타겟." }
        ];

        let selectedWaypoints = [];
        let currentTargetId = null;

        const WORLD_W = 1400, WORLD_H = 800, GRID_RES = 70;
        let scene, camera, renderer, controls, terrain;
        let pathGroup = new THREE.Group();
        const labelElements = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        let touchStartX = 0, touchStartY = 0;

        // 지형 고도 함수
        function getElevation(x, z) {
            const nx = x / (WORLD_W / 2), nz = z / (WORLD_H / 2);
            const r = Math.sqrt(nx * nx + nz * nz);
            if (r > 1.0) return -50; 
            const angle = Math.atan2(z, x); 
            const steepness = (Math.sin(angle) > 0) ? 2.5 : 3.3;
            const baseElev = 430 * Math.exp(-Math.pow(r * steepness, 2.1));
            let oreums = 0;
            oreums += Math.sin(x * 0.03) * Math.cos(z * 0.03) * 12;
            const peakImpact = r < 0.12 ? (0.12 - r) * 1100 : 0;
            return Math.max(-2, baseElev + oreums + peakImpact);
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.set(0, 1200, 1100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(500, 1000, 500);
            scene.add(sun);
            scene.add(pathGroup);

            const geo = new THREE.PlaneGeometry(WORLD_W, WORLD_H, GRID_RES-1, GRID_RES-1);
            const pos = geo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                pos.setZ(i, getElevation(pos.getX(i), -pos.getY(i)));
            }
            geo.computeVertexNormals();
            const mat = new THREE.MeshStandardMaterial({ color: 0x334155, wireframe: true, transparent: true, opacity: 0.2 });
            terrain = new THREE.Mesh(geo, mat);
            terrain.rotation.x = -Math.PI / 2;
            scene.add(terrain);

            const overlay = document.getElementById('labels-overlay');
            LANDMARKS.forEach(loc => {
                const grp = new THREE.Group();
                const ey = getElevation(loc.x, loc.z);
                grp.position.set(loc.x, ey, loc.z);

                const hit = new THREE.Mesh(new THREE.SphereGeometry(25, 16, 16), new THREE.MeshBasicMaterial({ visible: false }));
                hit.userData = { id: loc.id };
                grp.add(hit);

                const pin = new THREE.Mesh(new THREE.ConeGeometry(15, 45, 4), new THREE.MeshStandardMaterial({ color: loc.color, emissive: loc.color, emissiveIntensity: 0.4 }));
                pin.position.y = 22; pin.rotation.x = Math.PI;
                grp.add(pin);
                scene.add(grp);

                const div = document.createElement('div');
                div.className = 'label-container';
                div.innerHTML = `<div class="bg-slate-900/90 text-white px-2 py-1 rounded-full border border-white/20 text-[9px] font-bold shadow-2xl">${loc.name}</div>`;
                overlay.appendChild(div);
                labelElements.push({ element: div, position: grp.position, id: loc.id });
            });

            renderer.domElement.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
            }, { passive: true });
            renderer.domElement.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].clientX; const touchEndY = e.changedTouches[0].clientY;
                if (Math.sqrt(Math.pow(touchEndX - touchStartX, 2) + Math.pow(touchEndY - touchStartY, 2)) < 10) handleInteraction(touchEndX, touchEndY);
            }, { passive: true });
            renderer.domElement.addEventListener('click', (e) => { if (e.pointerType !== 'touch') handleInteraction(e.clientX, e.clientY); });

            animate();
        }

        function handleInteraction(x, y) {
            mouse.x = (x / window.innerWidth) * 2 - 1; mouse.y = -(y / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const targets = raycaster.intersectObjects(scene.children, true);
            const found = targets.find(i => i.object.userData && i.object.userData.id);
            if (found) showCard(found.object.userData.id); else hideCard();
        }

        function showCard(id) {
            const data = LANDMARKS.find(l => l.id === id); currentTargetId = id;
            document.getElementById('geoTitle').innerText = data.name;
            document.getElementById('geoRock').innerText = data.rock;
            document.getElementById('geoLayer').innerText = data.layer;
            document.getElementById('geoDesc').innerText = data.desc;
            const card = document.getElementById('geoInfoCard');
            card.classList.remove('hidden'); setTimeout(() => card.style.transform = 'translateY(0)', 10);
            updateBtnState(id);
        }

        function hideCard() {
            const card = document.getElementById('geoInfoCard');
            card.style.transform = 'translateY(120%)'; setTimeout(() => card.classList.add('hidden'), 300);
        }

        function updateBtnState(id) {
            const btn = document.getElementById('addToPathBtn');
            const isIncluded = selectedWaypoints.includes(id);
            btn.innerText = isIncluded ? "제거" : "추가";
            btn.className = isIncluded ? "w-full bg-red-500/20 text-red-400 border border-red-500/30 py-4 rounded-2xl text-xs font-black" : "w-full bg-emerald-500 text-slate-950 py-4 rounded-2xl text-xs font-black";
        }

        function toggleWaypoint(id) {
            const idx = selectedWaypoints.indexOf(id);
            if (idx > -1) selectedWaypoints.splice(idx, 1); else selectedWaypoints.push(id);
            renderUI();
            if (currentTargetId === id) updateBtnState(id);
        }

        function renderUI() {
            const list = document.getElementById('selectionList'); list.innerHTML = '';
            selectedWaypoints.forEach((id, i) => {
                const data = LANDMARKS.find(l => l.id === id);
                const chip = document.createElement('div');
                chip.className = "bg-emerald-500 text-slate-950 px-4 py-2 rounded-2xl text-[9px] font-black flex items-center gap-2 flex-shrink-0 shadow-lg touch-active";
                chip.innerHTML = `<span>${i+1}. ${data.name}</span><span class="opacity-50" onclick="event.stopPropagation(); toggleWaypoint('${id}')">✕</span>`;
                chip.onclick = () => showCard(id);
                list.appendChild(chip);
            });
            document.getElementById('calcBtn').disabled = selectedWaypoints.length < 2;
        }

        // --- 정밀 물리 공식 구현 (사용자 요청 공식 엄격 적용) ---
        async function solvePath(start, end, weight) {
            const nodes = []; const step = WORLD_W / GRID_RES;
            for (let z = -WORLD_H/2; z <= WORLD_H/2; z += step) {
                for (let x = -WORLD_W/2; x <= WORLD_W/2; x += step) {
                    nodes.push({ x, y: z, g: Infinity, h: 0, prev: null, v: false });
                }
            }
            const nearest = (p) => nodes.reduce((a, b) => ((a.x-p.x)**2+(a.y-p.y)**2) < ((b.x-p.x)**2+(b.y-p.y)**2) ? a : b);
            const sn = nearest(start), en = nearest(end); sn.g = 0; const openSet = [sn];

            while (openSet.length > 0) {
                openSet.sort((a,b) => (a.g+a.h)-(b.g+b.h));
                const curr = openSet.shift();
                if(curr === en) break; curr.v = true;

                const neighbors = nodes.filter(n => !n.v && Math.abs(n.x-curr.x) <= step + 1 && Math.abs(n.y-curr.y) <= step + 1);
                for (const next of neighbors) {
                    // [실측 오차 보정 계수] 
                    // 1. 거리 계수 78.4: 공항-성산 44km 최적화
                    // 2. 고도 계수 2.5: 한라산 9시간/관음사 4시간 최적화 (지층 각도 효과)
                    const dist2d = Math.sqrt((next.x-curr.x)**2 + (next.y-curr.y)**2) * 78.4;
                    const dh = (getElevation(next.x, next.y) - getElevation(curr.x, curr.y)) * 2.5;
                    const slope = dh / dist2d; // s: 경사도 (tan x)

                    // 공식 1: W = 6 * e^(-3.5 * |s + 0.05|) [보행속도 km/h]
                    const W = 6.0 * Math.exp(-3.5 * Math.abs(slope + 0.05));
                    const S = (W * 1000) / 60; // S: 이동속도 [m/min]
                    const timeMin = dist2d / S;

                    // 공식 2: VO2 = (0.1 * S) + (1.8 * S * G) + 3.5 [산소섭취량 ml/kg/min]
                    // G: 경사각도(%) -> 여기서는 slope(tan x)를 비율로 사용
                    const G = Math.max(0, slope);
                    const VO2 = (0.1 * S) + (1.8 * S * G) + 3.5;
                    
                    const energyTotal = VO2 * timeMin; // 총 산소 섭취량 비례 에너지
                    const cost = (timeMin * (1 - weight)) + (energyTotal * 0.012 * weight);
                    const newG = curr.g + cost;

                    if (newG < next.g) {
                        next.g = newG;
                        next.h = Math.sqrt((next.x-en.x)**2 + (next.y-en.y)**2);
                        next.prev = curr;
                        if (!openSet.includes(next)) openSet.push(next);
                    }
                }
            }
            const res = []; let t = en; while(t) { res.push(t); t = t.prev; }
            return res.reverse();
        }

        document.getElementById('calcBtn').addEventListener('click', async () => {
            const btn = document.getElementById('calcBtn');
            const weight = document.getElementById('weightSlider').value / 100;
            btn.innerText = "분석 중..."; btn.disabled = true;
            while(pathGroup.children.length > 0) pathGroup.remove(pathGroup.children[0]);

            let tTime = 0, tVO2 = 0, tDist = 0;
            const points = [];

            for (let i = 0; i < selectedWaypoints.length - 1; i++) {
                const s = LANDMARKS.find(l => l.id === selectedWaypoints[i]);
                const e = LANDMARKS.find(l => l.id === selectedWaypoints[i+1]);
                const segment = await solvePath({x: s.x, y: s.z}, {x: e.x, y: e.z}, weight);

                segment.forEach((node, j) => {
                    points.push(new THREE.Vector3(node.x, getElevation(node.x, node.y) + 8, node.y));
                    if (j < segment.length - 1) {
                        const d2d = Math.sqrt((segment[j+1].x-node.x)**2 + (segment[j+1].y-node.y)**2) * 78.4;
                        const slp = (getElevation(segment[j+1].x, segment[j+1].y) - getElevation(node.x, node.y)) * 2.5 / d2d;
                        const v_min = (6.0 * Math.exp(-3.5 * Math.abs(slp + 0.05)) * 1000) / 60;
                        const tm = d2d / v_min;
                        tTime += tm;
                        tVO2 += ((0.1 * v_min) + (1.8 * v_min * Math.max(0, slp)) + 3.5) * tm;
                        tDist += d2d;
                    }
                });
            }

            pathGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), new THREE.LineBasicMaterial({ color: 0x10b981 })));
            document.getElementById('resultArea').classList.remove('hidden');
            const h = Math.floor(tTime / 60); const m = Math.round(tTime % 60);
            document.getElementById('resTime').innerText = h > 0 ? `${h}시간 ${m}분` : `${m}분`;
            document.getElementById('resEnergy').innerText = Math.round(tVO2).toLocaleString() + "ml";
            document.getElementById('resDist').innerText = (tDist/1000).toFixed(1) + "km";
            btn.innerText = "분석 완료";
            setTimeout(() => { btn.innerText = "시뮬레이션 시작"; btn.disabled = false; }, 2000);
        });

        function animate() {
            requestAnimationFrame(animate); controls.update();
            labelElements.forEach(item => {
                const v = item.position.clone().project(camera);
                if (v.z > 1) item.element.style.display = 'none';
                else {
                    item.element.style.display = 'block';
                    item.element.style.left = `${(v.x * 0.5 + 0.5) * window.innerWidth}px`;
                    item.element.style.top = `${(v.y * -0.5 + 0.5) * window.innerHeight - 35}px`;
                }
            });
            renderer.render(scene, camera);
        }

        document.getElementById('addToPathBtn').addEventListener('click', () => { if(currentTargetId) toggleWaypoint(currentTargetId); });
        document.getElementById('closeInfoBtn').addEventListener('click', hideCard);
        document.getElementById('resetBtn').addEventListener('click', () => { selectedWaypoints = []; renderUI(); while(pathGroup.children.length > 0) pathGroup.remove(pathGroup.children[0]); });
        window.onload = init;
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
