    <script>
        /**

        const LANDMARKS = [

                source: "출처: 윤선 외(2014) '제주도 구조운동사', 김일중(2002) '단면도 분석을 통한 제주도의 지형 연구'"
            },
            { 
                id: 'kwanumsa', name: "관음사", x: -20, z: -100, color: "#f87171", tag: "Hillside", 
                desc: "한라산 북측 사면. 고제주화산체 상부에 형성된 한라산현무암군이 주를 이룸. 경사가 급해지는 지형적 전이대.",

                source: "출처: 윤선 외(2014) '제주도 구조운동사'"
            },
            { 
                id: 'sungsan', name: "성산일출봉", x: 510, z: 50, color: "#fbbf24", tag: "Tuff Cone", 
                desc: "수성화산활동으로 형성된 응회구(Tuff Cone). 화산성암설사태층과 신양리층 퇴적 시기 이후의 특징적 지형.",
                source: "출처: 윤선 외(2014) '제주도 구조운동사'"
            }
        ];

        // 시뮬레이션 설정 (수정 금지)
        const WORLD_W = 1600, WORLD_H = 1000, GRID_RES = 80;
        const DIST_SCALE = 68.5; 
        
        let scene, camera, renderer, controls, terrain;
        let selectedWaypoints = [];
        let currentTargetId = null;
        let pathGroup = new THREE.Group();
        const labelElements = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function getElevation(x, z) {
            const nx = x / (WORLD_W / 2), nz = z / (WORLD_H / 2);
            const r = Math.sqrt(nx * nx + nz * nz);
            if (r > 0.95) return -20;
            const base = 280 * Math.exp(-Math.pow(r * 1.5, 2.2));
            const centerPeak = r < 0.25 ? (0.25 - r) * 1100 * Math.exp(-r * 2) : 0;
            const noise = Math.sin(x * 0.05) * Math.cos(z * 0.05) * 3;
            return Math.max(0, base + centerPeak + noise);
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.set(0, 1200, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2.1;

            scene.add(new THREE.AmbientLight(0x404040, 1.2));
            const sun = new THREE.DirectionalLight(0x60a5fa, 0.8);
            sun.position.set(200, 1000, 200);
            scene.add(sun);
            scene.add(pathGroup);

            const geo = new THREE.PlaneGeometry(WORLD_W, WORLD_H, GRID_RES-1, GRID_RES-1);
            const pos = geo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                pos.setZ(i, getElevation(pos.getX(i), -pos.getY(i)));
            }
            geo.computeVertexNormals();
            terrain = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x1e293b, wireframe: true, transparent: true, opacity: 0.2 }));
            terrain.rotation.x = -Math.PI / 2;
            scene.add(terrain);

            const overlay = document.getElementById('labels-overlay');
            LANDMARKS.forEach(loc => {
                const group = new THREE.Group();
                group.position.set(loc.x, getElevation(loc.x, loc.z), loc.z);
                const hit = new THREE.Mesh(new THREE.SphereGeometry(35, 8, 8), new THREE.MeshBasicMaterial({ visible: false }));
                hit.userData = { id: loc.id };
                group.add(hit);
                const pin = new THREE.Mesh(new THREE.ConeGeometry(10, 30, 4), new THREE.MeshStandardMaterial({ color: loc.color, emissive: loc.color, emissiveIntensity: 0.5 }));
                pin.position.y = 15; pin.rotation.x = Math.PI;
                group.add(pin);
                scene.add(group);

                const div = document.createElement('div');
                div.className = 'label-container';
                div.innerHTML = `<div class="bg-slate-900/80 backdrop-blur-md text-white border border-white/10 px-3 py-1 rounded-full text-[10px] font-bold shadow-xl">${loc.name}</div>`;
                overlay.appendChild(div);
                labelElements.push({ element: div, position: group.position, id: loc.id });
            });

            renderer.domElement.addEventListener('click', (e) => onInteraction(e.clientX, e.clientY));
            renderer.domElement.addEventListener('touchstart', (e) => { if (e.touches.length === 1) onInteraction(e.touches[0].clientX, e.touches[0].clientY); });
            animate();
        }

        function onInteraction(cx, cy) {
            mouse.x = (cx / window.innerWidth) * 2 - 1;
            mouse.y = -(cy / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            const found = intersects.find(i => i.object.userData && i.object.userData.id);
            if (found) showGeoCard(found.object.userData.id); else hideGeoCard();
        }

        function showGeoCard(id) {
            const data = LANDMARKS.find(l => l.id === id);
            currentTargetId = id;
            document.getElementById('geoTitle').innerText = data.name;
            document.getElementById('geoDesc').innerText = data.desc;
            document.getElementById('geoSource').innerText = data.source;
            document.getElementById('geoTag').innerText = data.tag;
            const card = document.getElementById('geoInfoCard');
            card.classList.remove('hidden');
            setTimeout(() => card.style.transform = 'translateY(0)', 10);
            updateAddBtn();
        }

        function hideGeoCard() {
            const card = document.getElementById('geoInfoCard');
            card.style.transform = 'translateY(150%)';
            setTimeout(() => card.classList.add('hidden'), 400);
        }

        function updateAddBtn() {
            const btn = document.getElementById('addToPathBtn');
            const exists = selectedWaypoints.includes(currentTargetId);
            btn.innerText = exists ? "경로에서 제거" : "경로에 추가";
            btn.className = exists ? "w-full bg-slate-800 text-red-400 border border-red-500/30 py-4 rounded-2xl text-xs font-black touch-active" : "w-full bg-emerald-500 text-slate-950 py-4 rounded-2xl text-xs font-black touch-active";
        }

        function toggleWaypoint() {
            if (!currentTargetId) return;
            const idx = selectedWaypoints.indexOf(currentTargetId);
            if (idx > -1) selectedWaypoints.splice(idx, 1); else selectedWaypoints.push(currentTargetId);
            updateAddBtn(); renderSelectionUI();
        }

        function renderSelectionUI() {
            const container = document.getElementById('selectionList'); container.innerHTML = '';
            selectedWaypoints.forEach((id, index) => {
                const data = LANDMARKS.find(l => l.id === id);
                const chip = document.createElement('div');
                chip.className = "bg-emerald-500 text-slate-950 px-4 py-2 rounded-xl text-[10px] font-black flex items-center gap-2 flex-shrink-0 shadow-lg touch-active";
                chip.innerHTML = `<span>${index + 1}. ${data.name}</span>`;
                chip.onclick = () => { currentTargetId = id; toggleWaypoint(); };
                container.appendChild(chip);
            });
            document.getElementById('calcBtn').disabled = selectedWaypoints.length < 2;
        }

        async function calculatePath() {
            const btn = document.getElementById('calcBtn');
            btn.innerText = "분석 중..."; btn.disabled = true;
            while(pathGroup.children.length > 0) pathGroup.remove(pathGroup.children[0]);

            let totalT = 0, totalE = 0, totalD = 0;
            const pathPoints = [];
            for (let i = 0; i < selectedWaypoints.length - 1; i++) {
                const start = LANDMARKS.find(l => l.id === selectedWaypoints[i]);
                const end = LANDMARKS.find(l => l.id === selectedWaypoints[i+1]);
                const segments = 40;
                for (let s = 0; s <= segments; s++) {
                    const r = s / segments;
                    const px = start.x + (end.x - start.x) * r;
                    const pz = start.z + (end.z - start.z) * r;
                    const py = getElevation(px, pz);
                    pathPoints.push(new THREE.Vector3(px, py + 5, pz));
                    if (s > 0) {
                        const pr = (s - 1) / segments;
                        const ppx = start.x + (end.x - start.x) * pr;
                        const ppz = start.z + (end.z - start.z) * pr;
                        const ppy = getElevation(ppx, ppz);
                        const d = Math.sqrt((px-ppx)**2 + (pz-ppz)**2) * DIST_SCALE;
                        const slope = (py - ppy) * 2 / d;
                        const speedMmin = (6 * Math.exp(-3.5 * Math.abs(slope + 0.05)) * 1000) / 60;
                        const tMin = d / speedMmin;
                        const vo2 = (0.1 * speedMmin) + (1.8 * speedMmin * Math.max(0, slope)) + 3.5;
                        totalT += tMin; totalE += (vo2 * 70 / 1000) * 5 * tMin; totalD += d;
                    }
                }
            }
            pathGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pathPoints), new THREE.LineBasicMaterial({ color: 0x34d399 })));
            document.getElementById('resultArea').classList.remove('hidden');
            const h = Math.floor(totalT / 60); const m = Math.round(totalT % 60);
            document.getElementById('resTime').innerText = h > 0 ? `${h}h ${m}m` : `${m}m`;
            document.getElementById('resEnergy').innerText = Math.round(totalE).toLocaleString() + " kcal";
            document.getElementById('resDist').innerText = (totalD / 1000).toFixed(1) + " km";
            btn.innerText = "분석 완료";
            setTimeout(() => { btn.innerText = "시뮬레이션 시작"; btn.disabled = false; }, 2000);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            labelElements.forEach(item => {
                const v = item.position.clone().project(camera);
                if (v.z > 1) item.element.style.display = 'none';
                else {
                    item.element.style.display = 'block';
                    item.element.style.left = `${(v.x * 0.5 + 0.5) * window.innerWidth}px`;
                    item.element.style.top = `${(v.y * -0.5 + 0.5) * window.innerHeight - 20}px`;
                }
            });
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        document.getElementById('addToPathBtn').addEventListener('click', toggleWaypoint);
        document.getElementById('closeInfoBtn').addEventListener('click', hideGeoCard);
        document.getElementById('calcBtn').addEventListener('click', calculatePath);
        document.getElementById('resetBtn').addEventListener('click', () => { selectedWaypoints = []; renderSelectionUI(); while(pathGroup.children.length > 0) pathGroup.remove(pathGroup.children[0]); document.getElementById('resultArea').classList.add('hidden'); });
    </script>
</body>
</html>
